<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Adelaja Tobiloba - Full Stack Software Developer | Portfolio</title>
    <meta
      name="description"
      content="Full stack software developer specializing in React, TypeScript, and Node.js. Building fast, scalable web applications. Available for freelance & contract work."
    />
    <meta
      name="keywords"
      content="software developer, full stack developer, React, TypeScript, Node.js, web development, portfolio"
    />
    <meta name="author" content="Adelaja Tobiloba" />
    <meta name="theme-color" content="#06B6D4" />

    <!-- Open Graph / Social Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourportfolio.com" />
    <meta
      property="og:title"
      content="Adelaja Tobiloba - Full Stack Software Developer"
    />

      property="og:description"
      content="Experienced full stack developer creating high-performance web applications with modern technologies."
    />
    <meta property="og:image" content="/avatar.jpg" />
    <meta property="og:image:alt" content="Adelaja Tobiloba" />

    <!-- Twitter Card Tags -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourportfolio.com" />
    <meta
      property="twitter:title"
      content="Adelaja Tobiloba - Full Stack Software Developer"
    />
    <meta
      property="twitter:description"
      content="Full stack developer | React | TypeScript | Node.js"
    />
    <meta property="twitter:image" content="/avatar.jpg" />
    <meta property="twitter:creator" content="@TobbyAdelaja" />

    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Adelaja Tobiloba",
        "url": "https://yourportfolio.com",
        "image": "/avatar.jpg",
        "jobTitle": "Full Stack Software Developer",
        "sameAs": [
          "https://x.com/TobbyAdelaja",
          "https://github.com/El-jefecito",
          "https://www.linkedin.com/in/adelaja-tobiloba/"
        ],
        "knowsAbout": [

          "TypeScript",
          "Node.js",
          "Full Stack Development",
          "Web Development"
        ],
        "description": "Full stack software developer specializing in building scalable, high-performance web applications"
      }
    </script>

    <!-- Google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap"
